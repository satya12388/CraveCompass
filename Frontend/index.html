<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>CraveCompass - Delicious AI Recommendations</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&family=Playfair+Display:ital,wght@0,600;1,600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="background-overlay"></div>
    <header class="glass-header">
      <div class="logo-container">
        <h1>CraveCompass</h1>
        <p>Your Intelligent Menu Guide</p>
      </div>
    </header>

    <main id="app-container">
      <!-- Input Section -->
      <section id="input-section" class="active">
        <div class="card">
          <div class="upload-container" id="upload-container">
            <input type="file" id="image-upload" accept="image/*" hidden />

            <div class="upload-area">
              <div class="upload-icon">
                <svg
                  width="40"
                  height="40"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                  <circle cx="8.5" cy="8.5" r="1.5"></circle>
                  <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
              </div>
              <h3 class="upload-title">Snap or Upload a Menu</h3>
              <p class="upload-subtitle">Accepts JPG, PNG, WEBP</p>
              <button
                id="upload-btn"
                class="btn outline-btn mt-3"
                style="pointer-events: none"
              >
                Browse Files
              </button>
            </div>
            <div id="file-indicator" class="file-indicator hidden">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
              </svg>
              <span id="file-name" class="file-name">No file selected</span>
              <button
                id="clear-file-btn"
                class="clear-file-btn"
                aria-label="Remove image"
              >
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <line x1="18" y1="6" x2="6" y2="18"></line>
                  <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
              </button>
            </div>
          </div>

          <div class="input-group">
            <label for="query-input">What are you craving?</label>
            <textarea
              id="query-input"
              placeholder="e.g., 'Show me vegetarian options'"
            ></textarea>
          </div>

          <button id="analyze-btn" class="btn primary-btn mt-4">
            <span>Discover Dishes</span>
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M5 12h14"></path>
              <path d="M12 5l7 7-7 7"></path>
            </svg>
          </button>
        </div>
        <div id="loading" class="hidden">
          <div class="spinner"></div>
          <p>Analyzing the menu... This might take a moment.</p>
        </div>
        <div id="error-message" class="error hidden"></div>
      </section>

      <!-- Output Section -->
      <section id="output-section">
        <div class="result-header">
          <h2>✨ Your Crave Matches</h2>
          <button id="back-btn" class="btn secondary-btn highlight-back-btn">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <line x1="19" y1="12" x2="5" y2="12"></line>
              <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back to Search
          </button>
        </div>
        <div id="results-container">
          <!-- Results injected here by app.js -->
        </div>
      </section>
    </main>

    <div class="ai-disclaimer">
      <svg
        width="14"
        height="14"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path
          d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"
        ></path>
        <line x1="12" y1="9" x2="12" y2="13"></line>
        <line x1="12" y1="17" x2="12.01" y2="17"></line>
      </svg>
      AI can make mistakes. Please verify information with the restaurant.
    </div>

    <!-- Item Details Modal -->
    <div id="item-modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modal-title">Dish Name</h2>
          <button id="close-modal-btn" class="close-btn">&times;</button>
        </div>
        <div id="modal-body">
          <!-- Details injected here -->
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
